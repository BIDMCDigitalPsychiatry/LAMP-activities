<!DOCTYPE html>
<html>
<head>
  <title>Spin the Wheel Test Harness</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f0f0; }
    #controls { padding: 10px 16px; background: #333; color: #fff; font-size: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    #controls button { padding: 6px 14px; cursor: pointer; border: none; border-radius: 4px; font-size: 13px; }
    #controls .btn-send { background: #359FFE; color: #fff; }
    #controls .btn-toggle { background: #555; color: #fff; }
    #controls .btn-clear { background: #777; color: #fff; }
    #controls select { padding: 5px 8px; border-radius: 4px; border: 1px solid #555; background: #444; color: #fff; font-size: 13px; }
    #controls label { font-size: 12px; color: #aaa; }
    #main { display: flex; height: calc(100vh - 44px); }
    #game-panel { flex: 1; min-width: 0; }
    #game-panel iframe { width: 100%; height: 100%; border: none; }
    #data-panel { width: 420px; background: #1e1e1e; color: #d4d4d4; font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; display: flex; flex-direction: column; border-left: 2px solid #444; }
    #data-panel.hidden { display: none; }
    #data-panel .tab-bar { display: flex; background: #2d2d2d; border-bottom: 1px solid #444; flex-shrink: 0; }
    #data-panel .tab { padding: 8px 16px; cursor: pointer; color: #888; font-size: 12px; border-bottom: 2px solid transparent; }
    #data-panel .tab.active { color: #fff; border-bottom-color: #359FFE; }
    #data-panel .tab-content { flex: 1; overflow-y: auto; padding: 12px; }
    .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .score-card { background: #2a2a2a; border-radius: 6px; padding: 10px 12px; }
    .score-card.full { grid-column: 1 / -1; }
    .score-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 4px; }
    .score-value { font-size: 20px; font-weight: 700; color: #fff; }
    .score-value.highlight { color: #4fc3f7; }
    .score-value.muted { color: #888; font-size: 16px; }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #333; }
    pre.json-view { white-space: pre-wrap; word-break: break-word; margin: 0; line-height: 1.5; }
    .json-key { color: #9cdcfe; }
    .json-string { color: #ce9178; }
    .json-number { color: #b5cea8; }
    .json-bool { color: #569cd6; }
    .json-null { color: #569cd6; }
    #log-panel { flex: 1; overflow-y: auto; padding: 12px; }
    .log-entry { padding: 3px 0; border-bottom: 1px solid #2a2a2a; font-size: 11px; color: #888; }
    .log-entry .log-time { color: #666; }
    .log-entry .log-msg { color: #0f0; }
    .no-data { color: #666; text-align: center; padding: 40px 20px; font-size: 13px; }
  </style>
</head>
<body>
  <!-- Spin_Wheel-specific config -->
  <script>
    window.HARNESS_CONFIG = {
      title: 'Spin the Wheel Test Harness',

      renderScores: function(s, data) {
        var html = '';

        // Standard scores
        html += sectionTitle('Decision-Making Scores');
        html += '<div class="score-grid">';
        html += scoreCard('Final Balance', '$' + s.final_balance, true, true);
        html += scoreCard('Net Earnings', (s.net_earnings >= 0 ? '+$' : '-$') + Math.abs(s.net_earnings), true);
        html += scoreCard('Starting Balance', '$' + s.starting_balance, false);
        html += '</div>';

        html += sectionTitle('Risk Profile');
        html += '<div class="score-grid">';
        html += scoreCard('Risk-Taking Rate', (s.risk_taking_rate * 100).toFixed(1) + '%', true, true);
        html += scoreCard('High-Risk Choices', s.total_high_risk_choices, true);
        html += scoreCard('Low-Risk Choices', s.total_low_risk_choices, true);
        html += scoreCard('Total Spins', s.total_spins, false);
        html += scoreCard('Mean RT', s.mean_reaction_time + 'ms', false);
        html += '</div>';

        // Legacy scores
        html += sectionTitle('Legacy Scores');
        html += '<div class="score-grid">';
        html += scoreCard('Score', s.score, false);
        html += scoreCard('Points', s.point, false);
        html += '</div>';

        // Game info
        html += sectionTitle('Game Info');
        html += '<div class="score-grid">';
        html += scoreCard('Duration', (data.duration / 1000).toFixed(1) + 's', true);
        html += scoreCard('Done', data.done ? 'Yes' : 'No', false);
        html += '</div>';

        // Questionnaire
        if (s.questionnaire) {
          html += sectionTitle('Questionnaire');
          html += '<div class="score-grid">';
          html += scoreCard('Clarity', s.questionnaire.clarity + ' / 5', false);
          html += scoreCard('Happiness', s.questionnaire.happiness + ' / 5', false);
          html += '</div>';
        }

        // Per-spin summary
        if (data.temporal_slices) {
          var spins = data.temporal_slices.filter(function(e) { return e.type !== 'manual_exit'; });
          if (spins.length > 0) {
            html += sectionTitle('Per-Spin Detail');
            html += '<table style="width:100%; border-collapse:collapse; font-size:11px;">';
            html += '<thead><tr style="color:#888; text-align:left; border-bottom:1px solid #444;">';
            html += '<th style="padding:4px">#</th>';
            html += '<th style="padding:4px">Btn</th>';
            html += '<th style="padding:4px">Risk</th>';
            html += '<th style="padding:4px">Win</th>';
            html += '<th style="padding:4px">Loss</th>';
            html += '<th style="padding:4px">Net</th>';
            html += '<th style="padding:4px">Balance</th>';
            html += '<th style="padding:4px">RT</th>';
            html += '</tr></thead><tbody>';
            spins.forEach(function(spin) {
              var netColor = spin.net_change > 0 ? '#4caf50' : spin.net_change < 0 ? '#e57373' : '#888';
              var riskColor = spin.risk_level === 'high' ? '#F59E0B' : '#6FCF97';
              html += '<tr style="border-bottom:1px solid #2a2a2a;">';
              html += '<td style="padding:4px; color:#666">' + spin.item + '</td>';
              html += '<td style="padding:4px; color:#4fc3f7; font-weight:700;">' + spin.level + '</td>';
              html += '<td style="padding:4px; color:' + riskColor + ';">' + spin.risk_level + '</td>';
              html += '<td style="padding:4px; color:#4caf50;">+$' + spin.win_amount + '</td>';
              html += '<td style="padding:4px; color:#e57373;">-$' + spin.loss_amount + '</td>';
              html += '<td style="padding:4px; color:' + netColor + '; font-weight:700;">' + (spin.net_change >= 0 ? '+' : '') + '$' + spin.net_change + '</td>';
              html += '<td style="padding:4px;">$' + spin.balance_after + '</td>';
              html += '<td style="padding:4px; color:#888;">' + spin.duration + 'ms</td>';
              html += '</tr>';
            });
            html += '</tbody></table>';
          }
        }

        return html;
      }
    };
  </script>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Base LAMP Test Harness (copied from LAMP-activities/test-harness.html) -->
  <!-- To update: sync changes from the generic harness -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <div id="controls">
    <strong>LAMP Activity Test Harness</strong>
    <label>Port:
      <select id="port-select">
        <option value="3000" selected>3000</option>
        <option value="3001">3001</option>
        <option value="3002">3002</option>
      </select>
    </label>
    <label>Language:
      <select id="lang-select">
        <option value="en-US" selected>en-US</option>
        <option value="es-ES">es-ES</option>
        <option value="hi-IN">hi-IN</option>
        <option value="fr-FR">fr-FR</option>
      </select>
    </label>
    <button class="btn-send" onclick="sendConfig()">Send Config</button>
    <button class="btn-send" onclick="reloadActivity()">Reload Activity</button>
    <button class="btn-toggle" onclick="togglePanel()">Toggle Data Panel</button>
    <button class="btn-clear" onclick="clearData()">Clear</button>
  </div>
  <div id="main">
    <div id="game-panel">
      <iframe id="game" src="http://localhost:3000"></iframe>
    </div>
    <div id="data-panel">
      <div class="tab-bar">
        <div class="tab active" data-tab="scores">Scores</div>
        <div class="tab" data-tab="slices">Temporal Slices</div>
        <div class="tab" data-tab="raw">Raw JSON</div>
        <div class="tab" data-tab="log">Log</div>
      </div>
      <div class="tab-content" id="tab-scores">
        <div class="no-data">Waiting for game results...</div>
      </div>
      <div class="tab-content" id="tab-slices" style="display:none">
        <div class="no-data">Waiting for game results...</div>
      </div>
      <div class="tab-content" id="tab-raw" style="display:none">
        <div class="no-data">Waiting for game results...</div>
      </div>
      <div class="tab-content" id="tab-log" style="display:none">
        <div id="log-panel"></div>
      </div>
    </div>
  </div>

  <script>
    var lastResult = null;

    var DEFAULTS = {
      title: 'LAMP Activity Test Harness',
      port: 3000,
      extraConfig: {},
      renderScores: null,
    };

    function getConfig() {
      return Object.assign({}, DEFAULTS, window.HARNESS_CONFIG || {});
    }

    function getIframe() {
      return document.getElementById('game');
    }

    function sendConfig() {
      var lang = document.getElementById('lang-select').value;
      var config = Object.assign({
        configuration: { language: lang },
        noBack: false,
        forward: true,
      }, getConfig().extraConfig);
      getIframe().contentWindow.postMessage(config, '*');
      log('Sent config: ' + JSON.stringify(config));
    }

    function reloadActivity() {
      var port = document.getElementById('port-select').value;
      var iframe = getIframe();
      iframe.src = 'http://localhost:' + port;
      log('Reloading activity on port ' + port);
    }

    window.addEventListener('message', function(e) {
      if (e.source !== getIframe().contentWindow) return;
      var data;
      try {
        data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
      } catch (err) {
        log('Non-JSON message: ' + String(e.data).substring(0, 100));
        return;
      }
      if (!data.static_data && !data.temporal_slices) {
        log('Non-result message: ' + JSON.stringify(data).substring(0, 100));
        return;
      }
      lastResult = data;
      log('Game result received');
      renderScoresTab(data);
      renderSlicesTab(data);
      renderRawTab(data);
    });

    document.getElementById('game').addEventListener('load', function() {
      log('iframe loaded, sending config...');
      sendConfig();
    });

    document.getElementById('port-select').addEventListener('change', function() {
      reloadActivity();
    });

    function renderScoresTab(data) {
      var cfg = getConfig();
      if (cfg.renderScores) {
        document.getElementById('tab-scores').innerHTML = cfg.renderScores(data.static_data, data);
        return;
      }
      document.getElementById('tab-scores').innerHTML = genericScoreRenderer(data);
    }

    function genericScoreRenderer(data) {
      var s = data.static_data;
      var html = '';
      html += sectionTitle('Game Info');
      html += '<div class="score-grid">';
      if (data.duration !== undefined) html += scoreCard('Duration', (data.duration / 1000).toFixed(1) + 's', true);
      if (data.done !== undefined) html += scoreCard('Done', data.done ? 'Yes' : 'No', false);
      if (data.forward !== undefined) html += scoreCard('Forward', data.forward ? 'Yes' : 'No', false);
      html += '</div>';
      var scalars = {}, objects = {};
      Object.keys(s).forEach(function(key) {
        var val = s[key];
        if (val === null || val === undefined) { scalars[key] = val; }
        else if (Array.isArray(val)) { objects[key] = val; }
        else if (typeof val === 'object') { objects[key] = val; }
        else { scalars[key] = val; }
      });
      var scalarKeys = Object.keys(scalars);
      if (scalarKeys.length > 0) {
        html += sectionTitle('Scores');
        html += '<div class="score-grid">';
        scalarKeys.forEach(function(key) { html += scoreCard(formatLabel(key), scalars[key], true); });
        html += '</div>';
      }
      Object.keys(objects).forEach(function(key) {
        var val = objects[key];
        html += sectionTitle(formatLabel(key));
        if (Array.isArray(val) && val.length > 0 && typeof val[0] === 'string') {
          html += '<ul style="list-style:none; padding:0; margin:0;">';
          val.forEach(function(item, i) {
            html += '<li style="padding:3px 0; border-bottom:1px solid #2a2a2a; color:#4fc3f7;">' + (i + 1) + '. ' + item + '</li>';
          });
          html += '</ul>';
        } else {
          html += '<pre class="json-view" style="font-size:11px;">' + syntaxHighlight(JSON.stringify(val, null, 2)) + '</pre>';
        }
      });
      return html;
    }

    function renderSlicesTab(data) {
      var slices = data.temporal_slices;
      if (!slices || slices.length === 0) {
        document.getElementById('tab-slices').innerHTML = '<div class="no-data">No temporal slices</div>';
        return;
      }
      var sample = slices.find(function(s) { return s.type !== 'manual_exit'; }) || slices[0];
      var columns = Object.keys(sample);
      var html = '<table style="width:100%; border-collapse:collapse; font-size:11px;">';
      html += '<thead><tr style="color:#888; text-align:left; border-bottom:1px solid #444;">';
      html += '<th style="padding:4px">#</th>';
      columns.forEach(function(col) { html += '<th style="padding:4px">' + formatLabel(col) + '</th>'; });
      html += '</tr></thead><tbody>';
      slices.forEach(function(entry, i) {
        if (entry.type === 'manual_exit') {
          html += '<tr style="color:#666; border-top:1px solid #444;"><td colspan="' + (columns.length + 1) + '" style="padding:4px">Exit (value: ' + entry.value + ')</td></tr>';
          return;
        }
        html += '<tr style="border-bottom:1px solid #2a2a2a;">';
        html += '<td style="padding:4px; color:#666">' + (i + 1) + '</td>';
        columns.forEach(function(col) {
          var val = entry[col];
          var style = 'padding:4px;';
          if (col === 'type' && typeof val === 'boolean') { style += ' color:' + (val ? '#4caf50' : '#e57373') + ';'; val = val ? 'Yes' : 'No'; }
          else if (col === 'item') { style += ' color:#4fc3f7; font-weight:700;'; }
          else if (col === 'duration' && typeof val === 'number') { val = val + 'ms'; }
          html += '<td style="' + style + '">' + (val !== null && val !== undefined ? val : '\u2014') + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
      document.getElementById('tab-slices').innerHTML = html;
    }

    function renderRawTab(data) {
      document.getElementById('tab-raw').innerHTML = '<pre class="json-view">' + syntaxHighlight(JSON.stringify(data, null, 2)) + '</pre>';
    }

    function log(msg) {
      var el = document.getElementById('log-panel');
      el.innerHTML += '<div class="log-entry"><span class="log-time">' + new Date().toLocaleTimeString() + '</span> <span class="log-msg">' + msg + '</span></div>';
      el.scrollTop = el.scrollHeight;
    }

    document.querySelectorAll('.tab').forEach(function(t) {
      t.addEventListener('click', function() {
        var tabName = t.getAttribute('data-tab');
        document.querySelectorAll('.tab').forEach(function(tb) { tb.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(c) { c.style.display = 'none'; });
        t.classList.add('active');
        document.getElementById('tab-' + tabName).style.display = 'block';
      });
    });

    function togglePanel() { document.getElementById('data-panel').classList.toggle('hidden'); }

    function clearData() {
      lastResult = null;
      document.getElementById('tab-scores').innerHTML = '<div class="no-data">Waiting for game results...</div>';
      document.getElementById('tab-slices').innerHTML = '<div class="no-data">Waiting for game results...</div>';
      document.getElementById('tab-raw').innerHTML = '<div class="no-data">Waiting for game results...</div>';
      document.getElementById('log-panel').innerHTML = '';
    }

    function scoreCard(label, value, highlight, full) {
      return '<div class="score-card' + (full ? ' full' : '') + '">' +
        '<div class="score-label">' + label + '</div>' +
        '<div class="score-value' + (highlight ? ' highlight' : ' muted') + '">' + (value !== null && value !== undefined ? value : '\u2014') + '</div></div>';
    }
    function sectionTitle(text) { return '<div class="section-title">' + text + '</div>'; }
    function formatLabel(key) {
      return key.replace(/_/g, ' ').replace(/([a-z])([A-Z])/g, '$1 $2').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }
    function syntaxHighlight(json) {
      json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      json = json.replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:');
      json = json.replace(/: "(.*?)"/g, ': <span class="json-string">"$1"</span>');
      json = json.replace(/: (\d+\.?\d*)/g, ': <span class="json-number">$1</span>');
      json = json.replace(/: (true|false)/g, ': <span class="json-bool">$1</span>');
      json = json.replace(/: (null)/g, ': <span class="json-null">null</span>');
      return json;
    }

    // Apply config
    (function() {
      var cfg = getConfig();
      document.title = cfg.title;
      document.querySelector('#controls strong').textContent = cfg.title;
    })();
  </script>
</body>
</html>
